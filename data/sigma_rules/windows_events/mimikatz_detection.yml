title: Mimikatz Detection via Process Creation
id: 4a9d1a76-5e7b-4f6a-8d8e-1c9f4d7e5b8a
status: stable
description: Detects the execution of Mimikatz tool used for credential dumping
references:
    - https://attack.mitre.org/software/S0002/
author: SIEMBuilder
date: 2024/01/01
modified: 2024/01/01
tags:
    - attack.credential_access
    - attack.t1003
level: high
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\mimikatz.exe'
    selection_cmdline:
        CommandLine|contains:
            - 'sekurlsa'
            - 'logonpasswords'
            - 'lsadump'
    condition: selection or selection_cmdline
falsepositives:
    - Unlikely in production environments
    - Security testing with documented approval
