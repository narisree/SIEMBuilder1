title: Suspicious PowerShell Command Execution
id: 7f0b3f1d-4e5c-4a9d-8b3e-2f6c7d8e9a1b
status: stable
description: Detects suspicious PowerShell commands often used by attackers
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: SIEMBuilder
date: 2024/01/01
modified: 2024/01/01
tags:
    - attack.execution
    - attack.t1059.001
level: high
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Invoke-Expression'
            - 'IEX'
            - 'DownloadString'
            - 'WebClient'
            - 'Invoke-Command'
            - '-encodedcommand'
            - '-enc'
            - 'bypass'
    condition: selection
falsepositives:
    - Legitimate administrative scripts
    - Automated deployment tools
